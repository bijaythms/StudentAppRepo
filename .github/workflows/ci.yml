name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ────────────────────────────────────
  backend-test:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Clean locked files
        run: |
          $ws = "${{ github.workspace }}"
          foreach ($dir in '.pytest_cache', '__pycache__') {
            $p = Join-Path $ws $dir
            if (Test-Path $p) { Remove-Item $p -Recurse -Force -ErrorAction SilentlyContinue }
          }
        working-directory: .
        continue-on-error: true

      - name: Verify Python version
        run: |
          $env:PATH = "C:\Users\bijay\AppData\Local\Programs\Python\Python313;C:\Users\bijay\AppData\Local\Programs\Python\Python313\Scripts;" + $env:PATH
          python --version

      - name: Upgrade pip
        run: |
          $env:PATH = "C:\Users\bijay\AppData\Local\Programs\Python\Python313;C:\Users\bijay\AppData\Local\Programs\Python\Python313\Scripts;" + $env:PATH
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          $env:PATH = "C:\Users\bijay\AppData\Local\Programs\Python\Python313;C:\Users\bijay\AppData\Local\Programs\Python\Python313\Scripts;" + $env:PATH
          python -m pip install --only-binary=:all: -r requirements.txt

      - name: Run unit tests
        run: |
          $env:PATH = "C:\Users\bijay\AppData\Local\Programs\Python\Python313;C:\Users\bijay\AppData\Local\Programs\Python\Python313\Scripts;" + $env:PATH
          python -m pytest tests/ -v --tb=short

  # ── Frontend Tests ───────────────────────────────────
  frontend-test:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run unit tests
        run: npm test

  # ── Docker Build ─────────────────────────────────────
  docker-build:
    runs-on: self-hosted
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Build backend image
        run: |
          docker build -t student-app-backend:${{ github.sha }} ./backend
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build frontend image
        run: |
          docker build -t student-app-frontend:${{ github.sha }} ./frontend
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify images
        run: docker images | Select-String "student-app"

      - name: Clean up old images
        run: docker image prune -f

  # ── Deploy ───────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Stop existing containers
        run: docker-compose down
        continue-on-error: true

      - name: Start all services
        run: |
          docker-compose up --build -d
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Wait for services to be healthy
        run: |
          $containers = @("studentapp-api", "studentapp-prometheus", "studentapp-db")
          $timeout = 12 # 12 * 5 seconds = 60 seconds total
          
          foreach ($container in $containers) {
              Write-Host "Checking health for $container..."
              $count = 0
              while ($count -lt $timeout) {
                  $status = docker inspect --format='{{.State.Health.Status}}' $container 2>$null
                  if ($status -eq "healthy") {
                      Write-Host "✅ $container is healthy!"
                      break
                  }
                  Write-Host "Waiting for $container... (Status: $status)"
                  Start-Sleep -Seconds 5
                  $count++
              }
              if ($count -eq $timeout) {
                  Write-Error "❌ $container failed to become healthy within 60 seconds."
                  exit 1
              }
          }

      - name: Show running containers
        run: docker-compose ps

      - name: Verify Web Access
        run: |
          # Final check to ensure ports are reachable from the host
          $endpoints = @(
            "http://localhost:8000/api/health",
            "http://localhost:3001", # Grafana port from your compose
            "http://localhost:9090"
          )
          foreach ($url in $endpoints) {
            $res = Invoke-WebRequest -Uri $url -UseBasicParsing -Method Get
            if ($res.StatusCode -eq 200) { Write-Host "✅ Reachable: $url" }
          }

  # ── Selenium Tests ───────────────────────────────────
  selenium-test:
    runs-on: self-hosted
    needs: [deploy]
    defaults:
      run:
        working-directory: selenium
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as safe directory
        run: git config --global --add safe.directory "${{ github.workspace }}"

      - name: Upgrade pip
        run: |
          $env:PATH = "C:\Users\bijay\AppData\Local\Programs\Python\Python313;C:\Users\bijay\AppData\Local\Programs\Python\Python313\Scripts;" + $env:PATH
          python -m pip install --upgrade pip

      - name: Install Selenium dependencies
        run: |
          $env:PATH = "C:\Users\bijay\AppData\Local\Programs\Python\Python313;C:\Users\bijay\AppData\Local\Programs\Python\Python313\Scripts;" + $env:PATH
          python -m pip install --only-binary=:all: -r requirements.txt

      - name: Run Selenium tests
        run: |
          $env:PATH = "C:\Users\bijay\AppData\Local\Programs\Python\Python313;C:\Users\bijay\AppData\Local\Programs\Python\Python313\Scripts;" + $env:PATH
          python -m pytest tests/ -v --tb=short
